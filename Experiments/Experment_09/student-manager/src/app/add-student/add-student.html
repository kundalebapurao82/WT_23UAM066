<h2>Add Student</h2>

<div class="form">
  <input [(ngModel)]="student.id" placeholder="ID">
  <input [(ngModel)]="student.name" placeholder="Name">
  <input [(ngModel)]="student.age" placeholder="Age">
  <input [(ngModel)]="student.course" placeholder="Course">

  <button (click)="add()">Add Student</button>
</div>
